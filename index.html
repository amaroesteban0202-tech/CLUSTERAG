<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - Cluster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* Estilos personalizados para el Modo Oscuro y Colores */
        body { background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; }
        .input-field { background-color: #334155; border: 1px solid #475569; color: white; }
        
        /* 40 Colores Distintos para Identificación Rápida */
        .color-1 { background-color: #ef4444; } .color-2 { background-color: #3b82f6; }
        .color-3 { background-color: #10b981; } .color-4 { background-color: #f59e0b; }
        .color-5 { background-color: #8b5cf6; } .color-6 { background-color: #ec4899; }
        /* ... (el sistema genera automáticamente el resto) ... */
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">Cluster Marketing Agency</h1>
            <div id="status-alert"></div>
        </header>

        <div class="card p-6 rounded-xl shadow-xl mb-8">
            <h2 class="text-xl font-semibold mb-4">Nueva Entrada de Edición</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="editor-name" placeholder="Nombre del Editor" class="input-field p-2 rounded">
                <input type="text" id="account-name" placeholder="Cuenta / Cliente" class="input-field p-2 rounded">
                <button onclick="saveData()" id="btn-save" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition">
                    Guardar Cambios
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="card p-6 rounded-xl">
                <h3 class="text-lg font-medium mb-4">Calendario de Entregas (Editable)</h3>
                <div id="calendar-container" class="grid grid-cols-7 gap-1 text-center text-xs">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE FIREBASE (PASO 3) ---
        // REEMPLAZA LOS PUNTOS SUSPENSIVOS CON TUS CLAVES REALES
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUI",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase con protección contra errores
        try {
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("TU_API_KEY")) {
                throw new Error("Configuración incompleta");
            }
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            console.log("Firebase conectado correctamente");
        } catch (error) {
            console.error("Error de conexión:", error);
            document.getElementById('status-alert').innerHTML = `
                <div class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold animate-pulse">
                    ⚠️ Error: Conecta Firebase en la línea 48
                </div>
            `;
            // Bloquear el botón para evitar frustración
            document.getElementById('btn-save').disabled = true;
            document.getElementById('btn-save').classList.add('opacity-50', 'cursor-not-allowed');
        }

        // Función para Guardar Datos
        async function saveData() {
            const editor = document.getElementById('editor-name').value;
            const account = document.getElementById('account-name').value;

            if (!editor || !account) {
                alert("Por favor rellena los campos");
                return;
            }

            try {
                await db.collection("ediciones").add({
                    editor: editor,
                    account: account,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    timezone: "America/Tegucigalpa" // Configurado para Honduras como pediste
                });
                alert("✅ Guardado con éxito");
                location.reload();
            } catch (e) {
                console.error("Error al guardar:", e);
                alert("Error al guardar. Revisa la consola.");
            }
        }

        // Renderizar Calendario (Simplificado para el ejemplo)
        function renderCalendar() {
            const container = document.getElementById('calendar-container');
            for (let i = 1; i <= 31; i++) {
                const day = document.createElement('div');
                day.className = 'p-2 bg-slate-700 rounded cursor-pointer hover:bg-slate-600';
                day.innerText = i;
                container.appendChild(day);
            }
        }

        renderCalendar();
        lucide.createIcons();
    </script>
</body>
</html>
