<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster Agency OS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Habilitar Modo Oscuro por clase
            theme: {
                extend: {}
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- Librerías React y Firebase -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            LayoutDashboard, Users, Calendar as CalendarIcon, Plus, ChevronLeft, ChevronRight, X, 
            CheckCircle2, Circle, ExternalLink, Briefcase, UserCircle2, Loader2, Trash2, 
            Video, ArrowRight, UserPlus, MonitorPlay, Search, Menu, PenTool, LayoutList, CalendarDays,
            AlertTriangle, Smile, Meh, Frown, Instagram, Edit, Inbox, Moon, Sun, MousePointerClick
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'firebase/firestore';

        // --- ⚠️ AQUI PONDRÁS TU CONFIGURACIÓN DE FIREBASE DESPUÉS ⚠️ ---
        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) { 
            console.warn("Firebase no conectado (Modo Demo Local)"); 
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cluster-agency-pro-mobile-v6';
        const MONTH_NAMES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        // --- 🕒 MOTOR DE TIEMPO ESTRICTO: ZONA HORARIA HONDURAS (GMT-6) ---
        const getHondurasDateString = (dateObj = new Date()) => {
            const formatter = new Intl.DateTimeFormat('es-HN', {
                timeZone: 'America/Tegucigalpa',
                year: 'numeric', month: '2-digit', day: '2-digit'
            });
            const parts = formatter.formatToParts(dateObj);
            const y = parts.find(p => p.type === 'year').value;
            const m = parts.find(p => p.type === 'month').value;
            const d = parts.find(p => p.type === 'day').value;
            return `${y}-${m}-${d}`; 
        };
        const getHondurasTodayStr = () => getHondurasDateString(new Date());

        // --- MAPA DE 40 COLORES DE ALTO CONTRASTE ---
        const PERSON_COLORS = {
            c1: { bg: 'bg-red-500', text: 'text-white' }, c2: { bg: 'bg-blue-600', text: 'text-white' },
            c3: { bg: 'bg-emerald-600', text: 'text-white' }, c4: { bg: 'bg-amber-500', text: 'text-white' },
            c5: { bg: 'bg-purple-600', text: 'text-white' }, c6: { bg: 'bg-pink-600', text: 'text-white' },
            c7: { bg: 'bg-cyan-600', text: 'text-white' }, c8: { bg: 'bg-orange-600', text: 'text-white' },
            c9: { bg: 'bg-indigo-600', text: 'text-white' }, c10: { bg: 'bg-teal-600', text: 'text-white' },
            c11: { bg: 'bg-red-900', text: 'text-white' }, c12: { bg: 'bg-blue-900', text: 'text-white' },
            c13: { bg: 'bg-emerald-900', text: 'text-white' }, c14: { bg: 'bg-amber-900', text: 'text-white' },
            c15: { bg: 'bg-purple-900', text: 'text-white' }, c16: { bg: 'bg-pink-900', text: 'text-white' },
            c17: { bg: 'bg-cyan-900', text: 'text-white' }, c18: { bg: 'bg-orange-900', text: 'text-white' },
            c19: { bg: 'bg-indigo-900', text: 'text-white' }, c20: { bg: 'bg-stone-800', text: 'text-white' },
            
            c21: { bg: 'bg-red-200 dark:bg-red-900', text: 'text-red-900 dark:text-red-100' }, 
            c22: { bg: 'bg-blue-200 dark:bg-blue-900', text: 'text-blue-900 dark:text-blue-100' },
            c23: { bg: 'bg-emerald-200 dark:bg-emerald-900', text: 'text-emerald-900 dark:text-emerald-100' }, 
            c24: { bg: 'bg-yellow-300 dark:bg-yellow-900', text: 'text-yellow-900 dark:text-yellow-100' },
            c25: { bg: 'bg-purple-200 dark:bg-purple-900', text: 'text-purple-900 dark:text-purple-100' }, 
            c26: { bg: 'bg-pink-200 dark:bg-pink-900', text: 'text-pink-900 dark:text-pink-100' },
            c27: { bg: 'bg-cyan-200 dark:bg-cyan-900', text: 'text-cyan-900 dark:text-cyan-100' }, 
            c28: { bg: 'bg-orange-200 dark:bg-orange-900', text: 'text-orange-900 dark:text-orange-100' },
            c29: { bg: 'bg-lime-300 dark:bg-lime-900', text: 'text-lime-900 dark:text-lime-100' }, 
            c30: { bg: 'bg-indigo-200 dark:bg-indigo-900', text: 'text-indigo-900 dark:text-indigo-100' },
            c31: { bg: 'bg-rose-300 dark:bg-rose-900', text: 'text-rose-900 dark:text-rose-100' }, 
            c32: { bg: 'bg-teal-200 dark:bg-teal-900', text: 'text-teal-900 dark:text-teal-100' },
            c33: { bg: 'bg-fuchsia-300 dark:bg-fuchsia-900', text: 'text-fuchsia-900 dark:text-fuchsia-100' }, 
            c34: { bg: 'bg-sky-200 dark:bg-sky-900', text: 'text-sky-900 dark:text-sky-100' },
            c35: { bg: 'bg-green-300 dark:bg-green-900', text: 'text-green-900 dark:text-green-100' }, 
            c36: { bg: 'bg-rose-500', text: 'text-white' },
            c37: { bg: 'bg-fuchsia-600', text: 'text-white' }, 
            c38: { bg: 'bg-sky-500', text: 'text-white' },
            c39: { bg: 'bg-yellow-500', text: 'text-slate-900' }, 
            c40: { bg: 'bg-lime-500', text: 'text-slate-900' },

            slate: { bg: 'bg-slate-200 dark:bg-slate-700', text: 'text-slate-800 dark:text-slate-100' },
            emerald: { bg: 'bg-emerald-100 dark:bg-emerald-900', text: 'text-emerald-800 dark:text-emerald-100' },
            indigo: { bg: 'bg-indigo-100 dark:bg-indigo-900', text: 'text-indigo-800 dark:text-indigo-100' }
        };

        const ACCOUNT_COLORS = Array.from({length: 20}, (_, i) => `c${i+1}`);
        const EDITOR_COLORS = Array.from({length: 20}, (_, i) => `c${i+21}`);

        const IconsMap = {
            LayoutDashboard, Users, CalendarIcon, Plus, ChevronLeft, ChevronRight, X, 
            CheckCircle2, Circle, ExternalLink, Briefcase, UserCircle2, Loader2, Trash2, 
            Video, ArrowRight, UserPlus, MonitorPlay, Search, Menu, PenTool, LayoutList, CalendarDays,
            AlertTriangle, Smile, Meh, Frown, Instagram, Edit, Inbox, Moon, Sun, MousePointerClick
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const LucideIcon = IconsMap[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        // --- APP PRINCIPAL ---
        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null); 
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            // MODO OSCURO (PERSISTENCIA)
            const [isDark, setIsDark] = useState(() => localStorage.getItem('cluster_theme') === 'dark');

            // MEMORIA DE PANTALLA (PERSISTENCIA)
            const [view, setView] = useState(() => localStorage.getItem('cluster_os_view') || 'dashboard');

            // Datos
            const [clients, setClients] = useState([]);
            const [events, setEvents] = useState([]); 
            const [managers, setManagers] = useState([]);
            const [editors, setEditors] = useState([]);
            const [editingTasks, setEditingTasks] = useState([]);
            const [accountTasks, setAccountTasks] = useState([]);

            // UI & Modales
            const [selectedClient, setSelectedClient] = useState(null);
            const [selectedManager, setSelectedManager] = useState(null);
            const [selectedEditor, setSelectedEditor] = useState(null);
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null, data: null, isEdit: false });
            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, type: null, id: null, title: '' });
            const [eventAction, setEventAction] = useState({ isOpen: false, event: null, type: null }); // Nuevo estado para Menú Táctil
            
            // Efecto Tema Oscuro
            useEffect(() => {
                const html = document.documentElement;
                if (isDark) {
                    html.classList.add('dark');
                    localStorage.setItem('cluster_theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    localStorage.setItem('cluster_theme', 'light');
                }
            }, [isDark]);

            // Auth
            useEffect(() => {
                if(!auth) { setLoading(false); return; }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) { console.error("Error de Autenticación:", error); }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, u => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsubscribe();
            }, []);

            // Carga de Datos
            useEffect(() => {
                if (!user || !db) return;
                const errHandler = (err) => console.error("Error de Firestore:", err);

                const unsubs = [
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), s => {
                        const list = s.docs.map(d => ({id: d.id, ...d.data()}));
                        setClients(list);
                        if (selectedClient) setSelectedClient(list.find(c => c.id === selectedClient.id));
                    }, errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'managers'), s => setManagers(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'editors'), s => setEditors(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'editing'), s => setEditingTasks(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'account_tasks'), s => setAccountTasks(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler)
                ];
                return () => unsubs.forEach(u => u());
            }, [user, selectedClient?.id]);

            // Helpers
            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
            const closeModal = () => setModalConfig({ isOpen: false, type: null, data: null, isEdit: false });
            const closeDelete = () => setDeleteConfirm({ isOpen: false, type: null, id: null });
            
            // Navegación con Memoria
            const handleNavigate = (newView) => { 
                setView(newView); 
                localStorage.setItem('cluster_os_view', newView);
                setIsMobileMenuOpen(false); 
            };

            const handleEventClick = (event, type) => {
                setEventAction({ isOpen: true, event, type });
            };

            // Notificaciones / Badges (Cálculos)
            const urgentEditions = editingTasks.filter(t => t.priority === 'urgente' && t.status !== 'aprobado').length;
            const pendingAccounts = accountTasks.filter(t => t.status === 'por_disenar').length;

            // --- ACCIONES CRUD ---
            const addClient = async (fd) => {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), { ...fd, manager: fd.manager || "", status: 'Activo', mood: 'Contento', createdAt: getHondurasTodayStr(), workflow: { week1: false, week2: false, week3: false, week4: false } });
                showToast('Cliente creado'); closeModal();
            };
            const updateClient = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id), data); showToast('Cliente actualizado'); closeModal(); };
            
            const addManager = async (fd) => {
                const color = ACCOUNT_COLORS[managers.length % ACCOUNT_COLORS.length];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'managers'), { ...fd, color });
                showToast('Account Manager agregado'); closeModal();
            };
            const updateManager = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'managers', id), data); showToast('Manager actualizado'); closeModal(); };

            const addEditor = async (fd) => {
                const color = EDITOR_COLORS[editors.length % EDITOR_COLORS.length];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'editors'), { ...fd, color });
                showToast('Editor agregado'); closeModal();
            };
            const updateEditor = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editors', id), data); showToast('Editor actualizado'); closeModal(); };

            const addAccountTask = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'account_tasks'), { ...data, status: 'por_disenar' }); showToast('Tarea agendada'); closeModal(); };
            const updateAccountTask = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', id), data); showToast('Tarea guardada'); closeModal(); };
            const advanceAccountTask = async (task) => {
                const next = task.status === 'por_disenar' ? 'aprobacion_interna' : task.status === 'aprobacion_interna' ? 'aprobado_internamente' : task.status === 'aprobado_internamente' ? 'publicado' : null;
                if (next) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', task.id), { status: next });
            };

            const addEditingTask = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'editing'), { ...data, status: 'editar' }); showToast('Tarea agendada'); closeModal(); };
            const updateEditingTask = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', id), data); showToast('Tarea guardada'); closeModal(); };
            const advanceEditingTask = async (task) => {
                const next = task.status === 'editar' ? 'correccion' : task.status === 'correccion' ? 'aprobado' : null;
                if (next) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', task.id), { status: next });
            };

            const addEvent = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'events'), data); showToast('Evento agendado'); closeModal(); };
            const updateEvent = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id), data); showToast('Evento guardado'); closeModal(); };

            const handleDelete = async () => {
                const { type, id } = deleteConfirm;
                try {
                    if (type === 'client') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id)); setView('clients'); setSelectedClient(null); }
                    if (type === 'manager') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'managers', id)); setView('managers'); setSelectedManager(null); }
                    if (type === 'editor') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editors', id)); setView('editors'); setSelectedEditor(null); }
                    if (type === 'event') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                    if (type === 'accountTask') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', id));
                    if (type === 'editingTask') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', id));
                    showToast('Eliminado correctamente');
                } catch(e) { console.error(e); showToast('Error al eliminar', 'error'); }
                closeDelete();
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-slate-50 dark:bg-slate-950"><Icon name="Loader2" className="animate-spin text-purple-600" size={32}/></div>;

            return (
                <div className="flex h-screen text-slate-900 dark:text-slate-100 overflow-hidden flex-col md:flex-row font-sans transition-colors duration-300">
                    
                    {/* HEADER MÓVIL */}
                    <div className="md:hidden bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4 flex justify-between items-center z-30 shadow-sm shrink-0">
                        <div className="flex items-center gap-2"><div className="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-black">C</div><span className="font-black text-slate-800 dark:text-white text-lg tracking-tight">CLUSTER</span></div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={24} /></button>
                    </div>

                    {/* OVERLAY */}
                    <div className={`fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm transition-opacity duration-300 md:hidden ${isMobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsMobileMenuOpen(false)} />

                    {/* SIDEBAR */}
                    <aside className={`fixed md:relative z-50 h-full bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col shadow-xl md:shadow-none w-64 shrink-0 transition-transform duration-300 ease-in-out top-0 left-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-8 hidden md:block">
                            <div className="flex items-center gap-3 mb-1"><div className="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center text-white font-black text-lg shadow-lg shadow-purple-900/20">C</div><h1 className="text-2xl font-black text-slate-800 dark:text-white tracking-tight">CLUSTER</h1></div>
                            <p className="text-[10px] uppercase font-bold text-slate-400 dark:text-slate-500 tracking-widest pl-11">Agency OS</p>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-1 pt-20 md:pt-4 overflow-y-auto custom-scroll">
                            <SidebarItem active={view === 'dashboard'} onClick={() => handleNavigate('dashboard')} icon="LayoutDashboard" label="Panel Central" color="purple" />
                            
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-2">Equipo & Clientes</div>
                            <SidebarItem active={view === 'clients' || view === 'client-detail'} onClick={() => handleNavigate('clients')} icon="Briefcase" label="Clientes" color="blue" />
                            <SidebarItem active={view === 'managers' || view === 'manager-detail'} onClick={() => handleNavigate('managers')} icon="Users" label="Account Managers" color="indigo" />
                            <SidebarItem active={view === 'editors' || view === 'editor-detail'} onClick={() => handleNavigate('editors')} icon="PenTool" label="Editores" color="rose" />
                            
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-2">Salas de Trabajo</div>
                            <SidebarItem active={view === 'account-room'} onClick={() => handleNavigate('account-room')} icon="LayoutList" label="Sala de Accounts" color="indigo" badge={pendingAccounts > 0 ? pendingAccounts : null} badgeColor="bg-indigo-500 text-white" />
                            <SidebarItem active={view === 'editions'} onClick={() => handleNavigate('editions')} icon="Video" label="Sala de Edición" color="amber" badge={urgentEditions > 0 ? urgentEditions : null} badgeColor="bg-red-500 text-white animate-pulse" />
                            
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mt-2">Global</div>
                            <SidebarItem active={view === 'calendar'} onClick={() => handleNavigate('calendar')} icon="CalendarIcon" label="Agenda Producción" color="emerald" />
                        </nav>

                        {/* FOOTER SIDEBAR CON TEMA OSCURO */}
                        <div className="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center text-white font-bold text-sm shadow-md">GO</div>
                                <div><p className="text-sm font-bold text-slate-700 dark:text-slate-200">Gerente Ops</p><p className="text-[10px] font-bold text-green-600 dark:text-green-400 uppercase flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Activo</p></div>
                            </div>
                            <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors shadow-sm" title={isDark ? "Cambiar a Modo Claro" : "Cambiar a Modo Oscuro"}>
                                <Icon name={isDark ? "Sun" : "Moon"} size={16} />
                            </button>
                        </div>
                    </aside>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="flex-1 overflow-y-auto relative scroll-smooth w-full h-full bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
                        <div className="p-4 md:p-8 max-w-[1600px] mx-auto min-h-full pb-20">
                            
                            {/* VISTAS */}
                            {view === 'dashboard' && <DashboardView clients={clients} managers={managers} events={events} tasks={editingTasks} accountTasks={accountTasks} />}
                            
                            {/* Clientes */}
                            {view === 'clients' && <ClientsView clients={clients} onAdd={() => setModalConfig({ isOpen: true, type: 'client' })} onSelect={(c) => { setSelectedClient(c); handleNavigate('client-detail'); }} />}
                            {view === 'client-detail' && selectedClient && <ClientDetail client={selectedClient} onBack={() => handleNavigate('clients')} onUpdate={updateClient} onDelete={() => setDeleteConfirm({ isOpen: true, type: 'client', id: selectedClient.id, title: selectedClient.name })} onEdit={() => setModalConfig({ isOpen: true, type: 'client', data: selectedClient, isEdit: true })} />}
                            
                            {/* Managers */}
                            {view === 'managers' && <TeamView title="Account Managers" team={managers} iconColor="indigo" onAdd={() => setModalConfig({ isOpen: true, type: 'manager' })} onSelect={(m) => { setSelectedManager(m); handleNavigate('manager-detail'); }} onDelete={(m) => setDeleteConfirm({ isOpen: true, type: 'manager', id: m.id, title: m.name })} onEdit={(m) => setModalConfig({ isOpen: true, type: 'manager', data: m, isEdit: true })} />}
                            {view === 'manager-detail' && selectedManager && <PersonCalendarDetail person={selectedManager} tasks={accountTasks} title="Planificación de Cuentas" baseColor={selectedManager.color || 'indigo'} onBack={() => handleNavigate('managers')} onAddEvent={(dateStr) => setModalConfig({ isOpen: true, type: 'accountTask', data: { date: dateStr, contextId: selectedManager.id } })} onEventClick={(e) => handleEventClick(e, 'accountTask')} />}
                            
                            {/* Editores */}
                            {view === 'editors' && <TeamView title="Editores" team={editors} iconColor="rose" onAdd={() => setModalConfig({ isOpen: true, type: 'editor' })} onSelect={(e) => { setSelectedEditor(e); handleNavigate('editor-detail'); }} onDelete={(e) => setDeleteConfirm({ isOpen: true, type: 'editor', id: e.id, title: e.name })} onEdit={(e) => setModalConfig({ isOpen: true, type: 'editor', data: e, isEdit: true })} />}
                            {view === 'editor-detail' && selectedEditor && <PersonCalendarDetail person={selectedEditor} tasks={editingTasks} title="Planificación de Edición" baseColor={selectedEditor.color || 'rose'} onBack={() => handleNavigate('editors')} onAddEvent={(dateStr) => setModalConfig({ isOpen: true, type: 'editingTask', data: { date: dateStr, contextId: selectedEditor.id } })} onEventClick={(e) => handleEventClick(e, 'editingTask')} />}

                            {/* Salas de Trabajo */}
                            {view === 'account-room' && <AccountRoomView tasks={accountTasks} managers={managers} onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'accountTask', data: { date: dateStr } })} onEdit={(task) => setModalConfig({ isOpen: true, type: 'accountTask', data: task, isEdit: true })} onAdvance={advanceAccountTask} onDelete={(id) => setDeleteConfirm({ isOpen: true, type: 'accountTask', id, title: 'Tarea' })} />}
                            {view === 'editions' && <EditionsRoomView tasks={editingTasks} editors={editors} onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'editingTask', data: { date: dateStr } })} onEdit={(task) => setModalConfig({ isOpen: true, type: 'editingTask', data: task, isEdit: true })} onAdvance={advanceEditingTask} onDelete={(id) => setDeleteConfirm({ isOpen: true, type: 'editingTask', id, title: 'Tarea' })} />}

                            {/* Calendario Global */}
                            {view === 'calendar' && (
                                <div className="h-full flex flex-col space-y-6 fade-in">
                                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white">Agenda de Producciones</h2>
                                    <div className="flex-1 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col overflow-hidden">
                                        <CalendarGrid events={events.filter(e => e.type === 'production')} baseColor="emerald" onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'event', data: { date: dateStr, type: 'production' } })} onEventClick={(e) => handleEventClick(e, 'event')} />
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* MODALES FLOTANTES */}
                    {toast && <Toast message={toast.message} type={toast.type} />}
                    {modalConfig.isOpen && <Modal config={modalConfig} onClose={closeModal} clients={clients} managers={managers} editors={editors} actions={{ addClient, updateClient, addManager, updateManager, addEditor, updateEditor, addEvent, updateEvent, addAccountTask, updateAccountTask, addEditingTask, updateEditingTask }} />}
                    {deleteConfirm.isOpen && <DeleteConfirmModal config={deleteConfirm} onClose={closeDelete} onConfirm={handleDelete} />}
                    {/* Nuevo Menú de Acción para Tareas en Calendario */}
                    <EventActionModal config={eventAction} onClose={() => setEventAction({ isOpen: false, event: null, type: null })} onEdit={(event, type) => setModalConfig({ isOpen: true, type, data: event, isEdit: true })} onDelete={(event, type) => setDeleteConfirm({ isOpen: true, type, id: event.id, title: event.title })} />
                </div>
            );
        }

        // --- SUB-COMPONENTES UI ---

        const SidebarItem = ({ active, onClick, icon, label, color, badge, badgeColor }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl border transition-all duration-200 group ${active ? `bg-${color}-50 dark:bg-${color}-500/20 text-${color}-700 dark:text-${color}-300 shadow-sm border-${color}-100 dark:border-${color}-500/30` : "text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-slate-200 border-transparent"}`}>
                <div className={`transition-transform duration-200 ${active ? 'scale-110' : 'group-hover:scale-110'}`}><Icon name={icon} size={20}/></div>
                <span className="font-bold text-sm flex-1 text-left">{label}</span>
                {badge && <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${badgeColor}`}>{badge}</span>}
                {active && !badge && <Icon name="ChevronRight" size={14} className={`ml-auto text-${color}-400 dark:text-${color}-500`} />}
            </button>
        );

        const Button = ({ children, onClick, type = 'button', color = 'purple', full, icon }) => (
            <button type={type} onClick={onClick} className={`${full ? 'w-full' : ''} bg-${color}-600 hover:bg-${color}-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg shadow-${color}-500/30 flex items-center justify-center gap-2 transition-all transform active:scale-95`}>{icon && <Icon name={icon}/>} {children}</button>
        );

        const EmptyState = ({ icon, text }) => (
            <div className="flex flex-col items-center justify-center p-6 text-center h-full opacity-60">
                <Icon name={icon} size={32} className="text-slate-400 dark:text-slate-500 mb-3" />
                <p className="text-sm font-bold text-slate-500 dark:text-slate-400">{text}</p>
            </div>
        );

        const SearchBar = ({ searchTerm, setSearchTerm, placeholder }) => (
            <div className="relative w-full md:w-64 shrink-0">
                <Icon name="Search" className="absolute left-3 top-3 text-slate-400 dark:text-slate-500" size={16}/>
                <input type="text" placeholder={placeholder} value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} className="w-full pl-9 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-medium text-slate-700 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500"/>
            </div>
        );

        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex items-center justify-between hover:shadow-md transition-shadow">
                <div><p className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1">{title}</p><p className="text-3xl font-black text-slate-800 dark:text-white">{value}</p></div>
                <div className={`p-3 rounded-xl bg-${color}-50 dark:bg-${color}-500/20 text-${color}-600 dark:text-${color}-400`}><Icon name={icon} size={24}/></div>
            </div>
        );

        const DashboardView = ({ clients, managers, events, tasks, accountTasks }) => (
            <div className="space-y-8 animate-in fade-in duration-500">
                <div><h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white">Resumen Operativo</h2></div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                    <StatCard title="Clientes Activos" value={clients.length} icon="Briefcase" color="blue" />
                    <StatCard title="Account Managers" value={managers.length} icon="Users" color="indigo" />
                    <StatCard title="Tareas Accounts" value={accountTasks.filter(t => t.status !== 'publicado').length} icon="LayoutList" color="indigo" />
                    <StatCard title="Pendientes Edición" value={tasks.filter(t => t.status !== 'aprobado').length} icon="Video" color="amber" />
                </div>
            </div>
        );

        const TeamView = ({ title, team, iconColor, onAdd, onSelect, onDelete, onEdit }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const filteredTeam = team.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            
            return (
                <div className="space-y-6 fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white">{title}</h2>
                        <div className="flex flex-col md:flex-row w-full md:w-auto gap-3">
                            <SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar miembro..." />
                            <Button onClick={onAdd} icon="UserPlus" color={iconColor}>Agregar a {title}</Button>
                        </div>
                    </div>
                    {filteredTeam.length === 0 ? (
                        <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 h-64"><EmptyState icon="Users" text="No hay miembros en este equipo aún." /></div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredTeam.map(person => {
                                const style = PERSON_COLORS[person.color] || PERSON_COLORS.slate;
                                return (
                                    <div key={person.id} onClick={() => onSelect(person)} className="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 hover:shadow-xl hover:border-slate-300 dark:hover:border-slate-600 transition-all cursor-pointer group relative">
                                        <div className="absolute top-4 right-4 flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                                            <button onClick={(e) => { e.stopPropagation(); onEdit(person); }} className="text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 p-3 md:p-2 bg-slate-50 dark:bg-slate-800 rounded-full hover:bg-blue-50 dark:hover:bg-slate-700"><Icon name="Edit" size={16}/></button>
                                            <button onClick={(e) => { e.stopPropagation(); onDelete(person); }} className="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 p-3 md:p-2 bg-slate-50 dark:bg-slate-800 rounded-full hover:bg-red-50 dark:hover:bg-slate-700"><Icon name="Trash2" size={16}/></button>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className={`h-14 w-14 ${style.bg} rounded-xl flex items-center justify-center text-2xl font-black ${style.text} shadow-sm border border-black/5 dark:border-white/5`}>
                                                {person.name.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800 dark:text-white pr-16 md:pr-12 truncate">{person.name}</h3>
                                                <p className="text-xs text-slate-500 dark:text-slate-400 truncate">{person.email || 'Miembro del equipo'}</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const PersonCalendarDetail = ({ person, tasks, title, baseColor, onBack, onAddEvent, onEventClick }) => {
            const style = PERSON_COLORS[baseColor] || PERSON_COLORS.slate;
            return (
                <div className="h-full flex flex-col space-y-6 fade-in">
                    <div className="flex flex-col md:flex-row items-start md:items-center gap-4">
                        <button onClick={onBack} className="p-3 md:p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300"><Icon name="ChevronLeft"/></button>
                        <div>
                            <h2 className="text-2xl font-black text-slate-800 dark:text-white flex items-center gap-3">
                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm shadow-sm border border-black/5 dark:border-white/5 ${style.bg} ${style.text}`}>{person.name.charAt(0).toUpperCase()}</div>
                                {person.name}
                            </h2>
                            <span className="text-sm font-bold text-slate-500 dark:text-slate-400">{title}</span>
                        </div>
                    </div>
                    <div className="flex-1 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col overflow-hidden">
                        <CalendarGrid events={tasks.filter(t => t.contextId === person.id)} baseColor={baseColor} onAdd={onAddEvent} onEventClick={onEventClick} />
                    </div>
                </div>
            );
        };

        const DateHeader = ({ currentDate, setCurrentDate, title, onAdd, btnText, btnColor, btnIcon, searchTerm, setSearchTerm }) => {
            const today = getHondurasTodayStr();
            return (
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                    <div className="flex items-center gap-3 w-full md:w-auto">
                        <Icon name="CalendarDays" className="text-slate-400 dark:text-slate-500 hidden md:block" size={24}/>
                        <div className="w-full md:w-auto">
                            <h2 className="text-xl font-black text-slate-800 dark:text-white">{title}</h2>
                            <div className="flex items-center gap-2 mt-1 w-full md:w-auto">
                                <input type="date" value={currentDate} onChange={(e) => setCurrentDate(e.target.value)} className="w-full md:w-auto text-sm font-bold text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1 outline-none"/>
                                {currentDate === today && <span className="text-[10px] bg-blue-100 dark:bg-blue-500/20 text-blue-700 dark:text-blue-400 font-bold px-2 py-0.5 rounded-full shrink-0">Hoy</span>}
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-col md:flex-row w-full md:w-auto gap-3 items-center">
                        <SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar en esta sala..." />
                        <Button onClick={() => onAdd(currentDate)} color={btnColor} icon={btnIcon} full>Nueva Tarea</Button>
                    </div>
                </div>
            );
        };

        const AccountRoomView = ({ tasks, managers, onAdd, onEdit, onAdvance, onDelete }) => {
            const [currentDate, setCurrentDate] = useState(getHondurasTodayStr()); 
            const [searchTerm, setSearchTerm] = useState('');
            const filteredTasks = tasks.filter(t => t.date === currentDate && t.title.toLowerCase().includes(searchTerm.toLowerCase()));
            
            const columns = [
                { id: 'por_disenar', title: 'Por Diseñar', color: 'slate' },
                { id: 'aprobacion_interna', title: 'Aprobación Interna', color: 'blue' },
                { id: 'aprobado_internamente', title: 'Aprobado Interno', color: 'emerald' },
                { id: 'publicado', title: 'Publicado', color: 'indigo' }
            ];

            return (
                <div className="h-full flex flex-col space-y-6 fade-in">
                    <DateHeader currentDate={currentDate} setCurrentDate={setCurrentDate} title="Sala de Accounts" onAdd={onAdd} btnText="Tarea" btnColor="indigo" btnIcon="Plus" searchTerm={searchTerm} setSearchTerm={setSearchTerm} />
                    <div className="flex-1 grid grid-cols-1 md:grid-cols-4 gap-4 overflow-hidden">
                        {columns.map(col => {
                            const colTasks = filteredTasks.filter(t => t.status === col.id);
                            return (
                                <div key={col.id} className="flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-800 h-full overflow-hidden">
                                    <div className={`p-3 font-black text-[11px] uppercase tracking-widest border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-${col.color}-50 dark:bg-${col.color}-500/10 text-${col.color}-700 dark:text-${col.color}-400`}>
                                        {col.title} <span className="bg-white dark:bg-slate-900 px-2 py-0.5 rounded-full text-slate-500 dark:text-slate-400 shadow-sm">{colTasks.length}</span>
                                    </div>
                                    <div className="p-3 flex-1 overflow-y-auto space-y-3 custom-scroll">
                                        {colTasks.length === 0 ? <EmptyState icon="Inbox" text="Vacío" /> : 
                                        colTasks.map(t => {
                                            const manager = managers.find(m => m.id === t.contextId);
                                            const mStyles = PERSON_COLORS[manager?.color] || PERSON_COLORS.slate;
                                            return (
                                                <div key={t.id} className="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-md transition-all group">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className={`text-[10px] font-bold px-2 py-1 rounded shadow-sm border border-black/5 dark:border-white/5 ${mStyles.bg} ${mStyles.text}`}>{manager ? manager.name : 'Sin asignar'}</span>
                                                        <div className="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => onEdit(t)} className="text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 p-1.5 md:p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icon name="Edit" size={16}/></button>
                                                            <button onClick={() => onDelete(t.id)} className="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 p-1.5 md:p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icon name="Trash2" size={16}/></button>
                                                        </div>
                                                    </div>
                                                    <p className="font-bold text-slate-700 dark:text-slate-200 text-sm mb-3 pr-2">{t.title}</p>
                                                    {col.id !== 'publicado' && <button onClick={() => onAdvance(t)} className={`w-full flex items-center justify-center gap-1 py-3 md:py-2 rounded-xl md:rounded-lg text-xs font-bold bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-${col.color}-100 dark:hover:bg-${col.color}-500/20 hover:text-${col.color}-700 dark:hover:text-${col.color}-300 transition-colors`}>Avanzar <Icon name="ArrowRight" size={12}/></button>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const EditionsRoomView = ({ tasks, editors, onAdd, onEdit, onAdvance, onDelete }) => {
            const [currentDate, setCurrentDate] = useState(getHondurasTodayStr());
            const [searchTerm, setSearchTerm] = useState('');
            const filteredTasks = tasks.filter(t => t.date === currentDate && t.title.toLowerCase().includes(searchTerm.toLowerCase()));
            
            const columns = [
                { id: 'editar', title: 'Por Editar', color: 'slate' },
                { id: 'correccion', title: 'En Corrección', color: 'amber' },
                { id: 'aprobado', title: 'Aprobado', color: 'emerald' }
            ];
            const priorityStyles = {
                urgente: 'bg-red-50 dark:bg-red-500/20 border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400',
                normal: 'bg-amber-50 dark:bg-amber-500/20 border-amber-200 dark:border-amber-500/30 text-amber-700 dark:text-amber-400',
                recurrente: 'bg-emerald-50 dark:bg-emerald-500/20 border-emerald-200 dark:border-emerald-500/30 text-emerald-700 dark:text-emerald-400'
            };

            return (
                <div className="h-full flex flex-col space-y-6 fade-in">
                    <DateHeader currentDate={currentDate} setCurrentDate={setCurrentDate} title="Sala de Edición" onAdd={onAdd} btnText="Tarea" btnColor="amber" btnIcon="Video" searchTerm={searchTerm} setSearchTerm={setSearchTerm} />
                    <div className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-hidden">
                        {columns.map(col => {
                            const colTasks = filteredTasks.filter(t => t.status === col.id);
                            return (
                                <div key={col.id} className="flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-800 h-full overflow-hidden">
                                    <div className={`p-4 font-black text-xs uppercase tracking-widest border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-${col.color}-50 dark:bg-${col.color}-500/10 text-${col.color}-700 dark:text-${col.color}-400`}>
                                        {col.title} <span className="bg-white dark:bg-slate-900 px-2 py-1 rounded-full text-slate-500 dark:text-slate-400 shadow-sm">{colTasks.length}</span>
                                    </div>
                                    <div className="p-4 flex-1 overflow-y-auto space-y-3 custom-scroll">
                                        {colTasks.length === 0 ? <EmptyState icon="Inbox" text="Vacío" /> : 
                                        colTasks.map(t => {
                                            const editor = editors.find(e => e.id === t.contextId);
                                            const pStyle = priorityStyles[t.priority] || priorityStyles.normal;
                                            const eStyles = PERSON_COLORS[editor?.color] || PERSON_COLORS.slate;
                                            return (
                                                <div key={t.id} className={`bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 shadow-sm hover:shadow-md transition-all group border-y border-r border-slate-200 dark:border-slate-800 ${t.priority === 'urgente' ? 'border-l-red-500' : t.priority === 'recurrente' ? 'border-l-emerald-500' : 'border-l-amber-500'}`}>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div className="flex gap-2">
                                                            <span className={`text-[9px] font-bold px-2 py-0.5 rounded uppercase border ${pStyle}`}>{t.priority || 'Normal'}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded shadow-sm border border-black/5 dark:border-white/5 ${eStyles.bg} ${eStyles.text}`}>{editor ? editor.name : 'Sin asignar'}</span>
                                                        </div>
                                                        <div className="flex gap-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => onEdit(t)} className="text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400 p-1.5 md:p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icon name="Edit" size={16}/></button>
                                                            <button onClick={() => onDelete(t.id)} className="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 p-1.5 md:p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800"><Icon name="Trash2" size={16}/></button>
                                                        </div>
                                                    </div>
                                                    <p className="font-bold text-slate-800 dark:text-slate-100 text-sm mb-1">{t.title}</p>
                                                    {t.notes && <p className="text-xs text-slate-500 dark:text-slate-400 mb-3 truncate">{t.notes}</p>}
                                                    {col.id !== 'aprobado' && <button onClick={() => onAdvance(t)} className={`w-full mt-2 flex items-center justify-center gap-1 py-3 md:py-2 rounded-xl md:rounded-lg text-xs font-bold bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-${col.color}-100 dark:hover:bg-${col.color}-500/20 hover:text-${col.color}-700 dark:hover:text-${col.color}-300 transition-colors`}>Avanzar <Icon name="ArrowRight" size={12}/></button>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            );
        };

        const ClientsView = ({ clients, onAdd, onSelect }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const filteredClients = clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.niche.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="space-y-6 fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 dark:text-white">Cartera de Clientes</h2>
                        <div className="flex flex-col md:flex-row w-full md:w-auto gap-3">
                            <SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar cliente o rubro..." />
                            <Button onClick={onAdd} color="blue" icon="Plus">Nuevo Cliente</Button>
                        </div>
                    </div>
                    {filteredClients.length === 0 ? (
                        <div className="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 h-64"><EmptyState icon="Briefcase" text="No hay clientes que coincidan." /></div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredClients.map(c => (
                                <div key={c.id} onClick={() => onSelect(c)} className="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 hover:shadow-xl hover:border-blue-300 dark:hover:border-blue-600 transition-all cursor-pointer relative">
                                    <div className="flex justify-between mb-4">
                                        <div className="h-14 w-14 bg-blue-50 dark:bg-blue-500/20 rounded-2xl flex items-center justify-center text-xl font-black text-blue-600 dark:text-blue-400">{c.logo}</div>
                                        <div className={`w-3 h-3 rounded-full shadow-sm border border-white dark:border-slate-900 ${c.mood === 'En Riesgo' ? 'bg-red-500 animate-pulse' : c.mood === 'Neutral' ? 'bg-amber-400' : 'bg-green-500'}`}></div>
                                    </div>
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white pr-4 truncate">{c.name}</h3>
                                    <p className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider truncate">{c.niche}</p>
                                    <div className="pt-4 border-t border-slate-50 dark:border-slate-800 mt-4 flex items-center gap-2 text-sm font-medium text-slate-600 dark:text-slate-300 truncate"><Icon name="UserCircle2" size={16} className="text-blue-400 dark:text-blue-500 shrink-0"/> {c.manager || 'Sin asignar'}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ClientDetail = ({ client, onBack, onUpdate, onDelete, onEdit }) => (
            <div className="space-y-6 max-w-5xl mx-auto fade-in">
                <button onClick={onBack} className="flex items-center gap-2 text-slate-400 dark:text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 font-bold text-sm uppercase p-2 -ml-2"><Icon name="ChevronLeft" size={16}/> Volver</button>
                <div className="bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-xl overflow-hidden">
                    <div className="bg-slate-900 dark:bg-slate-950 p-6 md:p-8 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative group border-b border-slate-800">
                        <button onClick={onEdit} className="absolute top-4 right-4 text-slate-400 hover:text-white p-2 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity"><Icon name="Edit" size={18}/></button>
                        <div className="flex items-center gap-6"><div className="h-20 w-20 bg-white/10 rounded-2xl flex items-center justify-center text-3xl font-black">{client.logo}</div><div><h1 className="text-2xl md:text-3xl font-black">{client.name}</h1><p className="text-blue-300 text-sm font-bold mt-1">{client.package}</p></div></div><div className="flex gap-2 bg-white/10 p-1 rounded-xl">{['Contento', 'Neutral', 'En Riesgo'].map(m => <button key={m} onClick={() => onUpdate(client.id, {mood: m})} className={`p-2 rounded-lg ${client.mood === m ? 'bg-white/20' : 'opacity-50 hover:opacity-100'}`}><Icon name={m === 'Contento' ? 'Smile' : m === 'Neutral' ? 'Meh' : 'Frown'} className={m === 'Contento' ? 'text-green-400' : m === 'Neutral' ? 'text-yellow-400' : 'text-red-400'}/></button>)}</div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 divide-y lg:divide-y-0 lg:divide-x divide-slate-100 dark:divide-slate-800">
                        <div className="lg:col-span-2 p-6 md:p-8 space-y-8">
                            <div className="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-2xl border border-slate-100 dark:border-slate-800"><h3 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="Instagram" size={14}/> Redes</h3><div className="flex flex-col md:flex-row gap-2"><input defaultValue={client.instagram} onBlur={(e) => onUpdate(client.id, {instagram: e.target.value})} placeholder="Link Instagram..." className="flex-1 bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 rounded-xl text-sm px-4 py-3 border outline-none text-slate-800 dark:text-slate-200"/><a href={client.instagram || '#'} target="_blank" className="bg-pink-50 dark:bg-pink-500/10 text-pink-600 dark:text-pink-400 px-4 py-3 rounded-xl font-bold text-sm hover:bg-pink-100 dark:hover:bg-pink-500/20 flex items-center justify-center gap-2">Ver <Icon name="ExternalLink" size={14}/></a></div></div>
                            <button onClick={onDelete} className="text-red-400 hover:text-red-600 dark:text-red-500 dark:hover:text-red-400 text-xs font-bold flex items-center gap-2 p-2 -ml-2"><Icon name="Trash2" size={14}/> ELIMINAR CLIENTE</button>
                        </div>
                        <div className="p-6 md:p-8 bg-slate-50/50 dark:bg-slate-900/50"><h3 className="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-6 flex items-center gap-2"><Icon name="CheckCircle2" size={14}/> Workflow</h3><div className="space-y-3">{['week1', 'week2', 'week3', 'week4'].map((w, i) => <CheckItem key={w} label={['Estrategia', 'Producción', 'Aprobación', 'Reporte'][i]} checked={client.workflow[w]} onToggle={() => onUpdate(client.id, {[`workflow.${w}`]: !client.workflow[w]})} />)}</div></div>
                    </div>
                </div>
            </div>
        );

        const CalendarGrid = ({ events, onAdd, onEventClick, baseColor = "emerald" }) => {
            const [date, setDate] = useState(new Date());
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const startDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            
            const style = PERSON_COLORS[baseColor] || PERSON_COLORS.slate;

            return (
                <>
                <div className="flex justify-between items-center p-4 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <div className={`font-bold uppercase text-xs tracking-widest text-slate-500 dark:text-slate-400`}>Vista Mensual</div>
                    <div className="flex items-center gap-4 bg-slate-50 dark:bg-slate-800 rounded-lg p-1"><button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth() - 1, 1))} className="p-3 md:p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md text-slate-500 dark:text-slate-300 shadow-sm"><Icon name="ChevronLeft" size={16}/></button><span className="font-black text-slate-700 dark:text-slate-200 w-32 text-center text-sm uppercase">{MONTH_NAMES[date.getMonth()]} {date.getFullYear()}</span><button onClick={() => setDate(new Date(date.getFullYear(), date.getMonth() + 1, 1))} className="p-3 md:p-2 hover:bg-white dark:hover:bg-slate-700 rounded-md text-slate-500 dark:text-slate-300 shadow-sm"><Icon name="ChevronRight" size={16}/></button></div>
                </div>
                <div className="flex-1 overflow-x-auto overflow-y-auto bg-slate-50 dark:bg-slate-950 custom-scroll">
                    <div className="grid grid-cols-7 auto-rows-fr min-w-[800px] h-full">
                        {['D','L','M','M','J','V','S'].map(d => <div key={d} className="py-2 text-center text-[10px] font-black text-slate-400 dark:text-slate-500 border-r border-b border-slate-200/50 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-10">{d}</div>)}
                        {Array(startDay).fill(null).map((_, i) => <div key={`empty-${i}`} className="border-r border-b border-slate-200/50 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/30" />)}
                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(d => {
                            const dStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                            const dayEvents = events.filter(e => e.date === dStr);
                            
                            return (
                                <div key={d} onClick={() => onAdd(dStr)} className="border-r border-b border-slate-200/60 dark:border-slate-800 bg-white dark:bg-slate-900 p-2 min-h-[120px] hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer group relative">
                                    <span className={`text-xs font-bold text-slate-400 dark:text-slate-500 group-hover:text-purple-500 dark:group-hover:text-purple-400`}>{d}</span>
                                    <div className="mt-2 space-y-1.5">
                                        {dayEvents.map(e => {
                                            const isCompleted = e.status === 'publicado' || e.status === 'aprobado';
                                            const itemBg = isCompleted ? 'bg-emerald-500' : style.bg;
                                            const itemText = isCompleted ? 'text-white' : style.text;
                                            const itemBorder = isCompleted ? 'border-emerald-600' : 'border-black/10 dark:border-white/5';

                                            return (
                                                <div key={e.id} onClick={(ev) => { ev.stopPropagation(); onEventClick(e); }} className={`text-[10px] sm:text-xs font-bold p-2 rounded-lg border shadow-sm relative group/evt cursor-pointer ${itemBg} ${itemText} ${itemBorder} hover:brightness-110 active:scale-95 transition-all flex items-center justify-between`}>
                                                    <span className="flex items-center gap-1.5 truncate">
                                                        {isCompleted && <Icon name="CheckCircle2" size={14} />}
                                                        {e.title}
                                                    </span>
                                                </div>
                                            )
                                        })}
                                    </div>
                                    <Icon name="Plus" className={`absolute bottom-2 right-2 text-slate-300 dark:text-slate-600 opacity-0 group-hover:opacity-100 transition-opacity`} size={16}/>
                                </div>
                            );
                        })}
                    </div>
                </div>
                </>
            );
        };

        // --- MENÚ DE ACCIÓN PARA TAREAS (MÓVIL/TABLET OPTIMIZADO) ---
        const EventActionModal = ({ config, onClose, onEdit, onDelete }) => {
            if (!config.isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-xs overflow-hidden border border-slate-200 dark:border-slate-800 animate-in zoom-in-95">
                        <div className="p-6 text-center border-b border-slate-100 dark:border-slate-800">
                            <div className="mx-auto w-12 h-12 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-500 dark:text-slate-400 mb-4"><Icon name="MousePointerClick" size={24} /></div>
                            <h3 className="text-lg font-black text-slate-800 dark:text-white truncate">{config.event.title}</h3>
                            <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">¿Qué deseas hacer?</p>
                        </div>
                        <div className="p-4 space-y-3">
                            <button onClick={() => { onClose(); onEdit(config.event, config.type); }} className="w-full flex items-center justify-center gap-3 py-4 bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 font-bold rounded-2xl hover:bg-blue-100 dark:hover:bg-blue-500/20 transition-colors">
                                <Icon name="Edit" size={20} /> Editar Elemento
                            </button>
                            <button onClick={() => { onClose(); onDelete(config.event, config.type); }} className="w-full flex items-center justify-center gap-3 py-4 bg-red-50 dark:bg-red-500/10 text-red-600 dark:text-red-400 font-bold rounded-2xl hover:bg-red-100 dark:hover:bg-red-500/20 transition-colors">
                                <Icon name="Trash2" size={20} /> Eliminar
                            </button>
                            <button onClick={onClose} className="w-full py-4 text-slate-500 dark:text-slate-400 font-bold rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors mt-2">
                                Cancelar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- FORMULARIOS / MODAL ---
        const Modal = ({ config, onClose, clients, managers, editors, actions }) => {
            const { type, data, isEdit } = config;
            
            const onSubmit = (e) => {
                e.preventDefault();
                const fd = Object.fromEntries(new FormData(e.target));
                
                if (isEdit) {
                    // MODO EDICIÓN
                    if (type === 'client') actions.updateClient(data.id, fd);
                    if (type === 'manager') actions.updateManager(data.id, { name: fd.name, email: fd.email });
                    if (type === 'editor') actions.updateEditor(data.id, { name: fd.name, email: fd.email });
                    if (type === 'event') actions.updateEvent(data.id, { title: fd.time ? `${fd.time} - ${fd.title}` : fd.title });
                    if (type === 'accountTask') actions.updateAccountTask(data.id, { title: fd.title, contextId: fd.manager || data.contextId });
                    if (type === 'editingTask') actions.updateEditingTask(data.id, { title: fd.title, priority: fd.priority, notes: fd.notes, contextId: fd.editor || data.contextId });
                } else {
                    // MODO CREACIÓN
                    if (type === 'client') actions.addClient(fd);
                    if (type === 'manager') actions.addManager({ name: fd.name, email: fd.email, assignedAccounts: [] });
                    if (type === 'editor') actions.addEditor(fd);
                    if (type === 'event') actions.addEvent({ date: data.date, title: fd.time ? `${fd.time} - ${fd.title}` : fd.title, type: data.type });
                    if (type === 'accountTask') actions.addAccountTask({ date: data.date, title: fd.time ? `${fd.time} - ${fd.title}` : fd.title, contextId: data.contextId || fd.manager });
                    if (type === 'editingTask') actions.addEditingTask({ date: data.date, title: fd.title, priority: fd.priority, notes: fd.notes, contextId: data.contextId || fd.editor });
                }
            };

            const titles = { client: 'Cliente', manager: 'Account Manager', editor: 'Editor', event: 'Producción', accountTask: 'Tarea de Account', editingTask: 'Tarea de Edición' };

            let displayDate = '';
            if (data?.date && typeof data.date === 'string') {
                const [y, m, d] = data.date.split('-');
                displayDate = new Date(y, m - 1, d).toLocaleDateString('es-HN', { weekday: 'long', day: 'numeric', month: 'long' });
            }

            return (
                <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col border border-slate-200 dark:border-slate-800">
                        <div className="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-950 shrink-0">
                            <h3 className="font-bold text-lg text-slate-800 dark:text-white">{isEdit ? 'Editar ' : 'Nuevo '}{titles[type]}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-full text-slate-500 dark:text-slate-400"><Icon name="X" size={20} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scroll">
                            <form onSubmit={onSubmit} className="space-y-4">
                                
                                {['event', 'accountTask', 'editingTask'].includes(type) && !isEdit && (
                                    <div className="text-center p-3 bg-slate-50 dark:bg-slate-950 rounded-xl border border-slate-200 dark:border-slate-800 mb-2">
                                        <p className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase">Para el día</p>
                                        <p className="text-lg font-black text-slate-800 dark:text-white capitalize">{displayDate}</p>
                                    </div>
                                )}

                                {type === 'client' && <><Input name="name" placeholder="Nombre" defaultValue={data?.name} required /><Input name="niche" placeholder="Rubro" defaultValue={data?.niche} required /><Input name="package" placeholder="Paquete" defaultValue={data?.package} required /><Input name="instagram" placeholder="Link Instagram" defaultValue={data?.instagram} /><select name="manager" defaultValue={data?.manager} className="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-purple-500 outline-none"><option value="">Asignar Manager (Opcional)</option>{managers.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}</select></>}
                                
                                {type === 'manager' && <><Input name="name" placeholder="Nombre Completo" defaultValue={data?.name} required /><Input name="email" type="email" placeholder="Correo" defaultValue={data?.email} required /></>}
                                
                                {type === 'editor' && <><Input name="name" placeholder="Nombre del Editor" defaultValue={data?.name} required /><Input name="email" type="email" placeholder="Correo" defaultValue={data?.email} required /></>}
                                
                                {type === 'event' && <><Input name="title" placeholder="Nombre Producción" defaultValue={data?.title} required autoFocus /><Input name="time" type="time" label="Hora (Opcional)" /></>}
                                
                                {type === 'accountTask' && <>
                                    <Input name="title" placeholder="¿Qué hay que hacer/publicar?" defaultValue={data?.title} required autoFocus />
                                    {!isEdit && <Input name="time" type="time" label="Hora (Opcional)" />}
                                    {(!data?.contextId || isEdit) && <select name="manager" required defaultValue={data?.contextId} className="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-purple-500 outline-none"><option value="">Selecciona Manager...</option>{managers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}</select>}
                                </>}
                                
                                {type === 'editingTask' && <>
                                    <Input name="title" placeholder="Título del Video/Diseño" defaultValue={data?.title} required autoFocus />
                                    <select name="priority" required defaultValue={data?.priority || 'normal'} className="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-950 focus:ring-2 focus:ring-purple-500 outline-none font-bold text-slate-700 dark:text-slate-200">
                                        <option value="normal" className="text-amber-600 dark:text-amber-400">🟡 Prioridad Normal</option>
                                        <option value="urgente" className="text-red-600 dark:text-red-400">🔴 URGENTE</option>
                                        <option value="recurrente" className="text-emerald-600 dark:text-emerald-400">🟢 Recurrente</option>
                                    </select>
                                    {(!data?.contextId || isEdit) && <select name="editor" required defaultValue={data?.contextId} className="w-full p-3 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-purple-500 outline-none"><option value="">Selecciona Editor...</option>{editors.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}</select>}
                                    <textarea name="notes" placeholder="Notas, links a drive..." defaultValue={data?.notes} className="w-full p-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl outline-none text-slate-700 dark:text-slate-200 placeholder:text-slate-400 dark:placeholder:text-slate-500 h-24 text-sm"></textarea>
                                </>}

                                <Button type="submit" full color={['editingTask', 'editor'].includes(type) ? 'rose' : type === 'accountTask' ? 'indigo' : 'purple'}>{isEdit ? 'Guardar Cambios' : 'Crear'}</Button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const DeleteConfirmModal = ({ config, onClose, onConfirm }) => (
            <div className="fixed inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-sm p-6 text-center border border-slate-200 dark:border-slate-800 animate-in zoom-in-95">
                    <div className="w-16 h-16 bg-red-100 dark:bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600 dark:text-red-400"><Icon name="AlertTriangle" size={32} /></div>
                    <h3 className="text-lg font-black text-slate-800 dark:text-white mb-2">¿Eliminar {config.title}?</h3>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mb-8">Esta acción es permanente y no se puede deshacer.</p>
                    <div className="flex gap-3"><button onClick={onClose} className="flex-1 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">Cancelar</button><button onClick={onConfirm} className="flex-1 py-4 bg-red-600 text-white font-bold rounded-2xl hover:bg-red-700 shadow-lg shadow-red-500/30 transition-colors">Confirmar</button></div>
                </div>
            </div>
        );

        const Toast = ({ message, type }) => (<div className={`fixed bottom-6 right-6 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 fade-in z-[70] ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 dark:bg-white text-white dark:text-slate-900'}`}><Icon name={type === 'success' ? "CheckCircle2" : "AlertTriangle"} size={20} className={type === 'success' ? "text-green-400" : ""}/><span className="font-bold text-sm">{message}</span></div>);
        
        const CheckItem = ({ label, checked, onToggle }) => (
            <button onClick={onToggle} className={`w-full flex items-center justify-between p-4 rounded-xl border transition-all duration-200 ${checked ? 'bg-green-50 dark:bg-green-500/10 border-green-200 dark:border-green-500/30 text-green-800 dark:text-green-400' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-500 dark:text-slate-400 hover:border-blue-300 dark:hover:border-blue-600'}`}><span className="font-bold text-sm">{label}</span>{checked ? <Icon name="CheckCircle2" size={20} className="text-green-500" /> : <Icon name="Circle" size={20} />}</button>
        );
        
        const Input = ({ label, ...props }) => (<div>{label && <label className="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase mb-1.5 ml-1">{label}</label>}<input className="w-full p-4 md:p-3 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none font-medium text-slate-700 dark:text-slate-200 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" {...props} /></div>);

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
