<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster Agency OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .drag-source-hidden { 
            position: absolute !important;
            opacity: 0 !important; 
            pointer-events: none !important;
            z-index: -100 !important;
            transition: none !important; 
        }
        .drag-over { 
            background-color: rgba(139, 92, 246, 0.08) !important; 
            border-color: rgba(139, 92, 246, 0.6) !important; 
            border-style: dashed !important; 
            transform: scale(1.01) !important;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            LayoutDashboard, Users, Calendar as CalendarIcon, Plus, ChevronLeft, ChevronRight, X, 
            CheckCircle2, Circle, ExternalLink, Briefcase, UserCircle2, Loader2, Trash2, 
            Video, ArrowRight, UserPlus, MonitorPlay, Search, Menu, PenTool, LayoutList, CalendarDays,
            AlertTriangle, Smile, Meh, Frown, Instagram, Edit, Inbox, Moon, Sun, MousePointerClick, Flame, ListTree, ChevronDown
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'firebase/firestore';

        const firebaseConfig = {
          apiKey: "AIzaSyBAnY2ihWlow17H-TjUKgueWpw2MqYpzUc",
          authDomain: "cluster-41f73.firebaseapp.com",
          projectId: "cluster-41f73",
          storageBucket: "cluster-41f73.firebasestorage.app",
          messagingSenderId: "210834819744",
          appId: "1:210834819744:web:e10ca79a3f9a5eb866d7c5",
          measurementId: "G-N16QDLDC7P"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (error) {
            console.warn("Firebase no conectado", error);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cluster-agency-pro-mobile-v6';
        const MONTH_NAMES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        const getHondurasDateString = (dateObj = new Date()) => {
            const formatter = new Intl.DateTimeFormat('es-HN', {
                timeZone: 'America/Tegucigalpa',
                year: 'numeric', month: '2-digit', day: '2-digit'
            });
            const parts = formatter.formatToParts(dateObj);
            const y = parts.find(p => p.type === 'year').value;
            const m = parts.find(p => p.type === 'month').value;
            const d = parts.find(p => p.type === 'day').value;
            return `${y}-${m}-${d}`; 
        };
        const getHondurasTodayStr = () => getHondurasDateString(new Date());

        const PERSON_COLORS = {
            c1: { bg: 'bg-red-500', text: 'text-white' }, c2: { bg: 'bg-blue-600', text: 'text-white' },
            c3: { bg: 'bg-emerald-600', text: 'text-white' }, c4: { bg: 'bg-amber-500', text: 'text-white' },
            c5: { bg: 'bg-purple-600', text: 'text-white' }, c6: { bg: 'bg-pink-600', text: 'text-white' },
            c7: { bg: 'bg-cyan-600', text: 'text-white' }, c8: { bg: 'bg-orange-600', text: 'text-white' },
            c9: { bg: 'bg-indigo-600', text: 'text-white' }, c10: { bg: 'bg-teal-600', text: 'text-white' },
            c21: { bg: 'bg-red-200 dark:bg-red-900', text: 'text-red-900 dark:text-red-100' }, 
            c22: { bg: 'bg-blue-200 dark:bg-blue-900', text: 'text-blue-900 dark:text-blue-100' },
            c23: { bg: 'bg-emerald-200 dark:bg-emerald-900', text: 'text-emerald-900 dark:text-emerald-100' }, 
            c24: { bg: 'bg-yellow-300 dark:bg-yellow-900', text: 'text-yellow-900 dark:text-yellow-100' },
            c25: { bg: 'bg-purple-200 dark:bg-purple-900', text: 'text-purple-900 dark:text-purple-100' }, 
            c26: { bg: 'bg-pink-200 dark:bg-pink-900', text: 'text-pink-900 dark:text-pink-100' },
            slate: { bg: 'bg-slate-200 dark:bg-slate-700', text: 'text-slate-800 dark:text-slate-100' },
            emerald: { bg: 'bg-emerald-100 dark:bg-emerald-900', text: 'text-emerald-800 dark:text-emerald-100' },
            indigo: { bg: 'bg-indigo-100 dark:bg-indigo-900', text: 'text-indigo-800 dark:text-indigo-100' },
            blue: { bg: 'bg-blue-100 dark:bg-blue-900', text: 'text-blue-800 dark:text-blue-100' },
            amber: { bg: 'bg-amber-100 dark:bg-amber-900', text: 'text-amber-800 dark:text-amber-100' },
        };

        const ACCOUNT_COLORS = ['c1', 'c2', 'c3', 'c5', 'c6', 'c7', 'c8', 'c9', 'c10'];
        const EDITOR_COLORS = ['c21', 'c22', 'c23', 'c24', 'c25', 'c26'];

        const IconsMap = {
            LayoutDashboard, Users, CalendarIcon, Plus, ChevronLeft, ChevronRight, X, 
            CheckCircle2, Circle, ExternalLink, Briefcase, UserCircle2, Loader2, Trash2, 
            Video, ArrowRight, UserPlus, MonitorPlay, Search, Menu, PenTool, LayoutList, CalendarDays,
            AlertTriangle, Smile, Meh, Frown, Instagram, Edit, Inbox, Moon, Sun, MousePointerClick, Flame, ListTree, ChevronDown
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const LucideIcon = IconsMap[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const AgencyLogo = ({ className }) => {
            return <div className={`bg-purple-600 flex items-center justify-center text-white font-black rounded-lg ${className}`}>C</div>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null); 
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isDark, setIsDark] = useState(() => localStorage.getItem('cluster_theme') === 'dark');
            const [view, setView] = useState(() => localStorage.getItem('cluster_os_view') || 'dashboard');

            const [clients, setClients] = useState([]);
            const [events, setEvents] = useState([]); 
            const [managers, setManagers] = useState([]);
            const [editors, setEditors] = useState([]);
            const [editingTasks, setEditingTasks] = useState([]);
            const [accountTasks, setAccountTasks] = useState([]);

            const [selectedClient, setSelectedClient] = useState(null);
            const [selectedManager, setSelectedManager] = useState(null);
            const [selectedEditor, setSelectedEditor] = useState(null);
            
            const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null, data: null, isEdit: false });
            const [deleteConfirm, setDeleteConfirm] = useState({ isOpen: false, type: null, id: null, title: '' });
            const [eventAction, setEventAction] = useState({ isOpen: false, event: null, type: null });
            const [taskDetailConfig, setTaskDetailConfig] = useState({ isOpen: false, task: null, type: null });
            const [dayDetailsModal, setDayDetailsModal] = useState({ isOpen: false, date: null }); 
            
            useEffect(() => {
                const html = document.documentElement;
                if (isDark) {
                    html.classList.add('dark');
                    localStorage.setItem('cluster_theme', 'dark');
                } else {
                    html.classList.remove('dark');
                    localStorage.setItem('cluster_theme', 'light');
                }
            }, [isDark]);

            useEffect(() => {
                if(!auth) { setLoading(false); return; }
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } catch (error) { console.error(error); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, u => { setUser(u); setLoading(false); });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const errHandler = (err) => console.error(err);

                const unsubs = [
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), s => {
                        const list = s.docs.map(d => ({id: d.id, ...d.data()}));
                        setClients(list);
                        if (selectedClient) setSelectedClient(list.find(c => c.id === selectedClient.id));
                    }, errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'events'), s => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'managers'), s => setManagers(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'editors'), s => setEditors(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'editing'), s => setEditingTasks(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler),
                    onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'account_tasks'), s => setAccountTasks(s.docs.map(d => ({id: d.id, ...d.data()}))), errHandler)
                ];
                return () => unsubs.forEach(u => u());
            }, [user, selectedClient?.id]);

            const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
            const closeModal = () => setModalConfig({ isOpen: false, type: null, data: null, isEdit: false });
            const closeDelete = () => setDeleteConfirm({ isOpen: false, type: null, id: null });
            
            const handleNavigate = (newView) => { 
                setView(newView); 
                localStorage.setItem('cluster_os_view', newView);
                setIsMobileMenuOpen(false); 
            };

            const handleEventClick = (event, type) => setEventAction({ isOpen: true, event, type });
            const triggerConfetti = () => { if (window.confetti) window.confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); };

            const urgentEditions = editingTasks.filter(t => t.priority === 'urgente' && t.status !== 'aprobado' && t.status !== 'publicado').length;
            const pendingAccounts = accountTasks.filter(t => t.status === 'por_disenar').length;

            const allActivities = [
                ...events.map(e => ({ ...e, collectionType: 'event', _color: 'emerald', _icon: 'CalendarIcon', _label: 'Producción' })),
                ...accountTasks.map(t => ({ ...t, collectionType: 'accountTask', _color: 'indigo', _icon: 'LayoutList', _label: 'Account' })),
                ...editingTasks.map(t => ({ ...t, collectionType: 'editingTask', _color: 'amber', _icon: 'Video', _label: 'Edición' }))
            ];

            const addClient = async (fd) => {
                const manager = managers.find(m => m.id === fd.managerId);
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), { ...fd, manager: manager ? manager.name : "", managerId: fd.managerId || "", status: 'Activo', mood: 'Contento', createdAt: getHondurasTodayStr(), workflow: { week1: false, week2: false, week3: false, week4: false } });
                showToast('Cliente creado'); closeModal();
            };
            const updateClient = async (id, data) => { 
                const manager = managers.find(m => m.id === data.managerId);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id), { ...data, manager: manager ? manager.name : "" }); 
                showToast('Cliente actualizado'); closeModal(); 
            };
            const reassignClientManager = async (client, newManagerId) => {
                if (!newManagerId) return;
                const newManager = managers.find(m => m.id === newManagerId);
                if (!newManager) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', client.id), { manager: newManager.name, managerId: newManager.id });
                    const tasksToMove = accountTasks.filter(t => t.clientId === client.id);
                    for (const t of tasksToMove) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', t.id), { contextId: newManager.id });
                    }
                    showToast(`Cliente mudado a ${newManager.name}`);
                } catch (e) { showToast("Error al reasignar", "error"); }
            };

            const addManager = async (fd) => {
                const color = ACCOUNT_COLORS[managers.length % ACCOUNT_COLORS.length];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'managers'), { ...fd, color });
                showToast('Manager agregado'); closeModal();
            };
            const updateManager = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'managers', id), data); showToast('Actualizado'); closeModal(); };

            const addEditor = async (fd) => {
                const color = EDITOR_COLORS[editors.length % EDITOR_COLORS.length];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'editors'), { ...fd, color });
                showToast('Editor agregado'); closeModal();
            };
            const updateEditor = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editors', id), data); showToast('Actualizado'); closeModal(); };

            const addAccountTask = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'account_tasks'), { ...data, status: 'por_disenar' }); showToast('Agendado'); closeModal(); };
            const updateAccountTask = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', id), data); showToast('Guardado'); closeModal(); };
            const changeAccountTaskStatus = async (task, newStatus) => {
                if (newStatus) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', task.id), { status: newStatus });
                    if (newStatus === 'publicado') triggerConfetti();
                }
            };

            const addEditingTask = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'editing'), { ...data, status: 'editar' }); showToast('Agendado'); closeModal(); };
            const updateEditingTask = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', id), data); showToast('Guardado'); closeModal(); };
            const changeEditingTaskStatus = async (task, newStatus) => {
                if (newStatus) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', task.id), { status: newStatus });
                    if (newStatus === 'aprobado' || newStatus === 'publicado') triggerConfetti();
                }
            };

            const addEvent = async (data) => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'events'), data); showToast('Agendado'); closeModal(); };
            const updateEvent = async (id, data) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id), data); showToast('Guardado'); closeModal(); };

            const handleDelete = async () => {
                const { type, id } = deleteConfirm;
                try {
                    if (type === 'client') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', id)); setView('clients'); setSelectedClient(null); }
                    if (type === 'manager') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'managers', id)); setView('managers'); setSelectedManager(null); }
                    if (type === 'editor') { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editors', id)); setView('editors'); setSelectedEditor(null); }
                    if (type === 'event') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', id));
                    if (type === 'accountTask') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'account_tasks', id));
                    if (type === 'editingTask') await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'editing', id));
                    showToast('Eliminado');
                } catch(e) { showToast('Error', 'error'); }
                closeDelete();
            };

            if (loading) return <div className="flex h-screen items-center justify-center"><Icon name="Loader2" className="animate-spin text-purple-600" size={32}/></div>;

            return (
                <div className="flex h-screen text-slate-900 dark:text-slate-100 overflow-hidden flex-col md:flex-row font-sans">
                    <div className="md:hidden bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-4 flex justify-between items-center z-30 shadow-sm shrink-0">
                        <div className="flex items-center gap-2"><AgencyLogo className="w-8 h-8 text-sm" /><span className="font-black text-slate-800 dark:text-white text-lg">CLUSTER</span></div>
                        <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><Icon name={isMobileMenuOpen ? "X" : "Menu"} size={24} /></button>
                    </div>

                    <div className={`fixed inset-0 z-40 bg-slate-900/50 backdrop-blur-sm transition-opacity md:hidden ${isMobileMenuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`} onClick={() => setIsMobileMenuOpen(false)} />

                    <aside className={`fixed md:relative z-50 h-full bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col w-64 shrink-0 transition-transform duration-300 top-0 left-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-8 hidden md:block">
                            <div className="flex items-center gap-3 mb-1"><AgencyLogo className="w-8 h-8 text-lg" /><h1 className="text-2xl font-black text-slate-800 dark:text-white">CLUSTER</h1></div>
                            <p className="text-[10px] uppercase font-bold text-slate-400 pl-11">Agency OS</p>
                        </div>
                        
                        <nav className="flex-1 px-4 space-y-1 pt-20 md:pt-4 overflow-y-auto custom-scroll">
                            <SidebarItem active={view === 'dashboard'} onClick={() => handleNavigate('dashboard')} icon="LayoutDashboard" label="Panel Central" color="purple" />
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 uppercase tracking-wider mt-2">Equipo & Clientes</div>
                            <SidebarItem active={view === 'clients' || view === 'client-detail'} onClick={() => handleNavigate('clients')} icon="Briefcase" label="Clientes" color="blue" />
                            <SidebarItem active={view === 'managers' || view === 'manager-detail'} onClick={() => handleNavigate('managers')} icon="Users" label="Account Managers" color="indigo" />
                            <SidebarItem active={view === 'editors' || view === 'editor-detail'} onClick={() => handleNavigate('editors')} icon="PenTool" label="Editores" color="rose" />
                            
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 uppercase tracking-wider mt-2">Salas de Trabajo</div>
                            <SidebarItem active={view === 'account-room'} onClick={() => handleNavigate('account-room')} icon="LayoutList" label="Sala de Accounts" color="indigo" badge={pendingAccounts > 0 ? pendingAccounts : null} badgeColor="bg-indigo-500 text-white" />
                            <SidebarItem active={view === 'editions'} onClick={() => handleNavigate('editions')} icon="Video" label="Sala de Edición" color="amber" badge={urgentEditions > 0 ? urgentEditions : null} badgeColor="bg-red-500 text-white animate-pulse" />
                            
                            <div className="pt-4 pb-2 pl-4 text-xs font-bold text-slate-400 uppercase tracking-wider mt-2">Global</div>
                            <SidebarItem active={view === 'general-calendar'} onClick={() => handleNavigate('general-calendar')} icon="CalendarDays" label="Calendario General" color="blue" />
                            <SidebarItem active={view === 'calendar'} onClick={() => handleNavigate('calendar')} icon="CalendarIcon" label="Agenda Producción" color="emerald" />
                        </nav>

                        <div className="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center text-white font-bold text-sm">GO</div>
                                <div><p className="text-sm font-bold">Gerente Ops</p><p className="text-[10px] font-bold text-green-500 uppercase flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> Activo</p></div>
                            </div>
                            <button onClick={() => setIsDark(!isDark)} className="p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-full text-slate-600 dark:text-slate-300"><Icon name={isDark ? "Sun" : "Moon"} size={16} /></button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto relative w-full h-full">
                        <div className="p-4 md:p-8 max-w-[1600px] mx-auto min-h-full pb-20">
                            {view === 'dashboard' && <DashboardView clients={clients} managers={managers} events={events} tasks={editingTasks} accountTasks={accountTasks} />}
                            {view === 'clients' && <ClientsView clients={clients} onAdd={() => setModalConfig({ isOpen: true, type: 'client' })} onSelect={(c) => { setSelectedClient(c); handleNavigate('client-detail'); }} />}
                            {view === 'client-detail' && selectedClient && <ClientDetail client={selectedClient} managers={managers} onReassignManager={reassignClientManager} onBack={() => handleNavigate('clients')} onUpdate={updateClient} onDelete={() => setDeleteConfirm({ isOpen: true, type: 'client', id: selectedClient.id, title: selectedClient.name })} onEdit={() => setModalConfig({ isOpen: true, type: 'client', data: selectedClient, isEdit: true })} />}
                            {view === 'managers' && <TeamView title="Account Managers" team={managers} iconColor="indigo" onAdd={() => setModalConfig({ isOpen: true, type: 'manager' })} onSelect={(m) => { setSelectedManager(m); handleNavigate('manager-detail'); }} onDelete={(m) => setDeleteConfirm({ isOpen: true, type: 'manager', id: m.id, title: m.name })} onEdit={(m) => setModalConfig({ isOpen: true, type: 'manager', data: m, isEdit: true })} />}
                            {view === 'manager-detail' && selectedManager && <PersonCalendarDetail person={selectedManager} tasks={accountTasks} title="Planificación de Cuentas" baseColor={selectedManager.color || 'indigo'} onBack={() => handleNavigate('managers')} onAddEvent={(dateStr) => setModalConfig({ isOpen: true, type: 'accountTask', data: { date: dateStr, contextId: selectedManager.id } })} onEventClick={(e) => handleEventClick(e, 'accountTask')} />}
                            {view === 'editors' && <TeamView title="Editores" team={editors} iconColor="rose" onAdd={() => setModalConfig({ isOpen: true, type: 'editor' })} onSelect={(e) => { setSelectedEditor(e); handleNavigate('editor-detail'); }} onDelete={(e) => setDeleteConfirm({ isOpen: true, type: 'editor', id: e.id, title: e.name })} onEdit={(e) => setModalConfig({ isOpen: true, type: 'editor', data: e, isEdit: true })} />}
                            {view === 'editor-detail' && selectedEditor && <PersonCalendarDetail person={selectedEditor} tasks={editingTasks} title="Planificación de Edición" baseColor={selectedEditor.color || 'rose'} onBack={() => handleNavigate('editors')} onAddEvent={(dateStr) => setModalConfig({ isOpen: true, type: 'editingTask', data: { date: dateStr, contextId: selectedEditor.id } })} onEventClick={(e) => handleEventClick(e, 'editingTask')} />}
                            {view === 'account-room' && <AccountRoomView tasks={accountTasks} managers={managers} clients={clients} onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'accountTask', data: { date: dateStr } })} onEdit={(task) => setModalConfig({ isOpen: true, type: 'accountTask', data: task, isEdit: true })} onChangeStatus={changeAccountTaskStatus} onDelete={(id) => setDeleteConfirm({ isOpen: true, type: 'accountTask', id, title: 'Tarea' })} onTaskClick={(t) => setTaskDetailConfig({ isOpen: true, task: t, type: 'accountTask' })} />}
                            {view === 'editions' && <EditionsRoomView tasks={editingTasks} editors={editors} clients={clients} onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'editingTask', data: { date: dateStr } })} onEdit={(task) => setModalConfig({ isOpen: true, type: 'editingTask', data: task, isEdit: true })} onChangeStatus={changeEditingTaskStatus} onDelete={(id) => setDeleteConfirm({ isOpen: true, type: 'editingTask', id, title: 'Tarea' })} onTaskClick={(t) => setTaskDetailConfig({ isOpen: true, task: t, type: 'editingTask' })} />}
                            {view === 'general-calendar' && (
                                <div className="h-full flex flex-col space-y-6 fade-in"><h2 className="text-2xl font-black">Calendario General</h2><div className="flex-1 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800"><GeneralCalendarGrid activities={allActivities} onDayClick={(dateStr) => setDayDetailsModal({ isOpen: true, date: dateStr })} /></div></div>
                            )}
                            {view === 'calendar' && (
                                <div className="h-full flex flex-col space-y-6 fade-in"><h2 className="text-2xl font-black">Agenda de Producciones</h2><div className="flex-1 bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800"><CalendarGrid events={events.filter(e => e.type === 'production')} baseColor="emerald" onAdd={(dateStr) => setModalConfig({ isOpen: true, type: 'event', data: { date: dateStr, type: 'production' } })} onEventClick={(e) => handleEventClick(e, 'event')} /></div></div>
                            )}
                        </div>
                    </main>

                    {toast && <Toast message={toast.message} type={toast.type} />}
                    {modalConfig.isOpen && <Modal config={modalConfig} onClose={closeModal} clients={clients} managers={managers} editors={editors} actions={{ addClient, updateClient, addManager, updateManager, addEditor, updateEditor, addEvent, updateEvent, addAccountTask, updateAccountTask, addEditingTask, updateEditingTask }} />}
                    {deleteConfirm.isOpen && <DeleteConfirmModal config={deleteConfirm} onClose={closeDelete} onConfirm={handleDelete} />}
                    <EventActionModal config={eventAction} onClose={() => setEventAction({ isOpen: false, event: null, type: null })} onEdit={(event, type) => setModalConfig({ isOpen: true, type, data: event, isEdit: true })} onDelete={(event, type) => setDeleteConfirm({ isOpen: true, type, id: event.id, title: event.title })} />
                    <DayDetailsModal config={dayDetailsModal} onClose={() => setDayDetailsModal({ isOpen: false, date: null })} activities={allActivities} clients={clients} managers={managers} editors={editors} onEdit={(act, type) => setModalConfig({ isOpen: true, type, data: act, isEdit: true })} onDelete={(act, type) => setDeleteConfirm({ isOpen: true, type, id: act.id, title: act.title })} />
                    <TaskDetailModal config={taskDetailConfig} onClose={() => setTaskDetailConfig({ isOpen: false, task: null, type: null })} clients={clients} managers={managers} editors={editors} onEdit={(task, type) => { setTaskDetailConfig({ isOpen: false, task: null, type: null }); setModalConfig({ isOpen: true, type, data: task, isEdit: true }); }} />
                </div>
            );
        }

        const SidebarItem = ({ active, onClick, icon, label, color, badge, badgeColor }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl border transition-all duration-200 group ${active ? `bg-${color}-50 dark:bg-${color}-500/20 text-${color}-700 dark:text-${color}-300 shadow-sm border-${color}-100 dark:border-${color}-500/30` : "text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800/50 border-transparent"}`}>
                <div className={`${active ? 'scale-110' : 'group-hover:scale-110'} transition-transform`}><Icon name={icon} size={20}/></div>
                <span className="font-bold text-sm flex-1 text-left">{label}</span>
                {badge && <span className={`text-[10px] font-black px-2 py-0.5 rounded-full ${badgeColor}`}>{badge}</span>}
            </button>
        );

        const Button = ({ children, onClick, type = 'button', color = 'purple', full, icon }) => (
            <button type={type} onClick={onClick} className={`${full ? 'w-full' : ''} bg-${color}-600 hover:bg-${color}-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2`}><Icon name={icon}/> {children}</button>
        );

        const EmptyState = ({ icon, text }) => (<div className="flex flex-col items-center justify-center p-6 text-center h-full opacity-60"><Icon name={icon} size={32} className="text-slate-400 mb-3" /><p className="text-sm font-bold text-slate-500">{text}</p></div>);

        const SearchBar = ({ searchTerm, setSearchTerm, placeholder }) => (
            <div className="relative w-full md:w-64 shrink-0"><Icon name="Search" className="absolute left-3 top-3 text-slate-400" size={16}/><input type="text" placeholder={placeholder} value={searchTerm} onChange={(e)=>setSearchTerm(e.target.value)} className="w-full pl-9 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none"/></div>
        );

        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 flex justify-between">
                <div><p className="text-xs font-bold text-slate-400 uppercase">{title}</p><p className="text-3xl font-black text-slate-800 dark:text-white">{value}</p></div>
                <div className={`p-3 rounded-xl bg-${color}-50 text-${color}-600 dark:bg-${color}-500/20 dark:text-${color}-400`}><Icon name={icon} size={24}/></div>
            </div>
        );

        const DashboardView = ({ clients, managers, events, tasks, accountTasks }) => {
            const allTasks = [...tasks, ...accountTasks];
            const compPercent = Math.round((allTasks.filter(t => t.status === 'aprobado' || t.status === 'publicado').length / (allTasks.length || 1)) * 100);
            return (
                <div className="space-y-8 fade-in">
                    <h2 className="text-2xl font-black">Resumen Operativo</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"><StatCard title="Clientes Activos" value={clients.length} icon="Briefcase" color="blue" /><StatCard title="Managers" value={managers.length} icon="Users" color="indigo" /><StatCard title="Tareas Accounts" value={accountTasks.length} icon="LayoutList" color="indigo" /><StatCard title="Pendientes Edición" value={tasks.length} icon="Video" color="amber" /></div>
                </div>
            );
        };

        const TeamView = ({ title, team, iconColor, onAdd, onSelect, onDelete, onEdit }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const filtered = team.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black">{title}</h2><div className="flex gap-3"><SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar..." /><Button onClick={onAdd} icon="UserPlus" color={iconColor}>Agregar</Button></div></div>
                    {filtered.length === 0 ? <EmptyState icon="Users" text="No hay miembros" /> : <div className="grid grid-cols-3 gap-6">{filtered.map(p => {
                        const style = PERSON_COLORS[p.color] || PERSON_COLORS.slate;
                        return (<div key={p.id} onClick={() => onSelect(p)} className="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 cursor-pointer relative group"><div className="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100"><button onClick={(e)=>{e.stopPropagation();onEdit(p);}} className="text-blue-500 p-2"><Icon name="Edit" size={16}/></button><button onClick={(e)=>{e.stopPropagation();onDelete(p);}} className="text-red-500 p-2"><Icon name="Trash2" size={16}/></button></div><div className="flex items-center gap-4"><div className={`w-14 h-14 rounded-xl flex items-center justify-center font-black text-2xl ${style.bg} ${style.text}`}>{p.name.charAt(0)}</div><div><h3 className="font-bold">{p.name}</h3></div></div></div>);
                    })}</div>}
                </div>
            );
        };

        const PersonCalendarDetail = ({ person, tasks, title, baseColor, onBack, onAddEvent, onEventClick }) => {
            return (
                <div className="h-full flex flex-col space-y-6 fade-in"><div className="flex items-center gap-4"><button onClick={onBack} className="p-2"><Icon name="ChevronLeft"/></button><h2 className="text-2xl font-black">{person.name}</h2></div><div className="flex-1 bg-white dark:bg-slate-900 rounded-2xl"><CalendarGrid events={tasks.filter(t => t.contextId === person.id)} baseColor={baseColor} onAdd={onAddEvent} onEventClick={onEventClick} /></div></div>
            );
        };

        const DateHeader = ({ currentDate, setCurrentDate, filterMode, setFilterMode, title, onAdd, btnColor, btnIcon, searchTerm, setSearchTerm }) => {
            return (
                <div className="flex justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-2xl border border-slate-200 dark:border-slate-800"><div className="flex items-center gap-4"><h2 className="text-xl font-black mr-4">{title}</h2><div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl"><button onClick={()=>setFilterMode('date')} className={`px-4 py-2 text-sm font-bold rounded-lg ${filterMode==='date'?'bg-white dark:bg-slate-700':''}`}>Día Específico</button><button onClick={()=>setFilterMode('overdue')} className={`px-4 py-2 text-sm font-bold rounded-lg ${filterMode==='overdue'?'bg-red-500 text-white':''}`}>Atrasadas</button><button onClick={()=>setFilterMode('all')} className={`px-4 py-2 text-sm font-bold rounded-lg ${filterMode==='all'?'bg-white dark:bg-slate-700':''}`}>Ver Todas</button></div>{filterMode === 'date' && <input type="date" value={currentDate} onChange={(e)=>setCurrentDate(e.target.value)} className="text-sm font-bold bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-2"/>}</div><div className="flex gap-3"><SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar tarea..." /><Button onClick={()=>onAdd(currentDate)} color={btnColor} icon={btnIcon}>Nueva Tarea</Button></div></div>
            );
        };

        const AccountRoomView = ({ tasks, managers, clients, onAdd, onEdit, onChangeStatus, onDelete, onTaskClick }) => {
            const [currentDate, setCurrentDate] = useState(getHondurasTodayStr()); 
            const [searchTerm, setSearchTerm] = useState('');
            const [filterMode, setFilterMode] = useState('date');
            const [draggedTaskId, setDraggedTaskId] = useState(null);
            const columns = [{ id: 'por_disenar', title: 'Por Diseñar', color: 'slate' }, { id: 'aprobacion_interna', title: 'Aprobación Interna', color: 'blue' }, { id: 'aprobado_internamente', title: 'Aprobado Interno', color: 'emerald' }, { id: 'publicado', title: 'Publicado', color: 'indigo' }];
            const filtered = tasks.filter(t => { if(searchTerm && !t.title.toLowerCase().includes(searchTerm.toLowerCase())) return false; if(filterMode === 'date') return t.date === currentDate; if(filterMode === 'overdue') return t.date < getHondurasTodayStr() && t.status !== 'publicado'; return true; });
            
            const handleDragStart = (e, taskId) => { setDraggedTaskId(taskId); setTimeout(()=>e.target.classList.add('opacity-50'),0); };
            const handleDragEnd = (e) => { e.target.classList.remove('opacity-50'); setDraggedTaskId(null); };

            return (
                <div className="h-full flex flex-col space-y-6 fade-in"><DateHeader currentDate={currentDate} setCurrentDate={setCurrentDate} filterMode={filterMode} setFilterMode={setFilterMode} title="Sala de Accounts" onAdd={onAdd} btnColor="indigo" btnIcon="Plus" searchTerm={searchTerm} setSearchTerm={setSearchTerm} /><div className="flex-1 grid grid-cols-4 gap-4">{columns.map((col, idx) => {
                    const colTasks = filtered.filter(t => t.status === col.id);
                    return (<div key={col.id} className="bg-slate-100 dark:bg-slate-800/50 rounded-2xl flex flex-col" onDragOver={e=>e.preventDefault()} onDrop={(e)=>{e.preventDefault(); if(draggedTaskId) onChangeStatus(tasks.find(t=>t.id===draggedTaskId), col.id)}}><div className={`p-3 font-black text-[11px] uppercase bg-${col.color}-50 text-${col.color}-700`}>{col.title} ({colTasks.length})</div><div className="p-3 flex-1 overflow-y-auto space-y-3">{colTasks.map(t => (<div key={t.id} draggable onDragStart={e=>handleDragStart(e,t.id)} onDragEnd={handleDragEnd} onClick={()=>onTaskClick(t)} className="bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border-l-4 border-l-indigo-500 cursor-pointer relative group"><div className="flex justify-between"><span className="font-bold text-sm truncate">{t.title}</span></div><div className="flex gap-1 mt-3">{idx > 0 && <button onClick={(e)=>{e.stopPropagation(); onChangeStatus(t, columns[idx-1].id)}} className="text-[10px] bg-slate-50 px-2 py-1 rounded">Atrás</button>} {idx < 3 && <button onClick={(e)=>{e.stopPropagation(); onChangeStatus(t, columns[idx+1].id)}} className="text-[10px] bg-indigo-50 px-2 py-1 rounded">Avanzar</button>}</div></div>))}</div></div>);
                })}</div></div>
            );
        };

        const EditionsRoomView = ({ tasks, editors, clients, onAdd, onEdit, onChangeStatus, onDelete, onTaskClick }) => {
            const [currentDate, setCurrentDate] = useState(getHondurasTodayStr());
            const [searchTerm, setSearchTerm] = useState('');
            const [filterMode, setFilterMode] = useState('date');
            const [draggedTaskId, setDraggedTaskId] = useState(null);
            
            // LA NUEVA ESTRUCTURA DE 4 COLUMNAS SOLICITADA
            const columns = [
                { id: 'editar', title: 'Por Editar', color: 'slate' }, 
                { id: 'correccion', title: 'En Corrección', color: 'amber' }, 
                { id: 'aprobado', title: 'Aprobado', color: 'emerald' }, 
                { id: 'publicado', title: 'Publicado', color: 'indigo' }
            ];
            
            const filtered = tasks.filter(t => { if(searchTerm && !t.title.toLowerCase().includes(searchTerm.toLowerCase())) return false; if(filterMode === 'date') return t.date === currentDate; if(filterMode === 'overdue') return t.date < getHondurasTodayStr() && t.status !== 'publicado'; return true; });
            const handleDragStart = (e, taskId) => { setDraggedTaskId(taskId); setTimeout(()=>e.target.classList.add('opacity-50'),0); };
            const handleDragEnd = (e) => { e.target.classList.remove('opacity-50'); setDraggedTaskId(null); };

            return (
                <div className="h-full flex flex-col space-y-6 fade-in"><DateHeader currentDate={currentDate} setCurrentDate={setCurrentDate} filterMode={filterMode} setFilterMode={setFilterMode} title="Sala de Edición" onAdd={onAdd} btnColor="amber" btnIcon="Video" searchTerm={searchTerm} setSearchTerm={setSearchTerm} /><div className="flex-1 grid grid-cols-4 gap-4">{columns.map((col, idx) => {
                    const colTasks = filtered.filter(t => t.status === col.id);
                    return (<div key={col.id} className="bg-slate-100 dark:bg-slate-800/50 rounded-2xl flex flex-col" onDragOver={e=>e.preventDefault()} onDrop={(e)=>{e.preventDefault(); if(draggedTaskId) onChangeStatus(tasks.find(t=>t.id===draggedTaskId), col.id)}}><div className={`p-3 font-black text-[11px] uppercase bg-${col.color}-50 dark:bg-${col.color}-500/10 text-${col.color}-700 dark:text-${col.color}-400`}>{col.title} ({colTasks.length})</div><div className="p-3 flex-1 overflow-y-auto space-y-3">{colTasks.map(t => {
                        const isOverdue = t.date < getHondurasTodayStr() && t.status !== 'publicado';
                        return (
                        <div key={t.id} draggable onDragStart={e=>handleDragStart(e,t.id)} onDragEnd={handleDragEnd} onClick={()=>onTaskClick(t)} className={`bg-white dark:bg-slate-900 p-4 rounded-xl shadow-sm border-l-4 cursor-pointer relative group ${isOverdue ? 'border-l-red-500' : 'border-l-amber-500'}`}><div className="flex justify-between"><span className="font-bold text-sm truncate">{t.title}</span><div className="flex gap-2 opacity-0 group-hover:opacity-100"><button onClick={(e)=>{e.stopPropagation();onEdit(t)}} className="text-blue-500"><Icon name="Edit" size={14}/></button><button onClick={(e)=>{e.stopPropagation();onDelete(t.id)}} className="text-red-500"><Icon name="Trash2" size={14}/></button></div></div>{isOverdue && <div className="text-[9px] text-red-500 font-bold mt-1">Atrasado</div>}<div className="flex gap-1.5 mt-3 pt-3 border-t border-slate-100">{idx > 0 && <button onClick={(e)=>{e.stopPropagation(); onChangeStatus(t, columns[idx-1].id)}} className="flex-1 text-[10px] bg-slate-50 dark:bg-slate-800 py-1.5 rounded font-bold text-center">Atrás</button>} {idx < 3 && <button onClick={(e)=>{e.stopPropagation(); onChangeStatus(t, columns[idx+1].id)}} className={`flex-1 text-[10px] bg-${col.color}-50 dark:bg-${col.color}-500/20 text-${col.color}-700 dark:text-${col.color}-400 py-1.5 rounded font-bold text-center`}>{idx === 2 ? 'Publicar' : 'Avanzar'}</button>}</div></div>
                    )})}</div></div>);
                })}</div></div>
            );
        };

        const ClientsView = ({ clients, onAdd, onSelect }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const filtered = clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()));
            return (<div className="space-y-6 fade-in"><div className="flex justify-between items-center"><h2 className="text-2xl font-black">Clientes</h2><div className="flex gap-3"><SearchBar searchTerm={searchTerm} setSearchTerm={setSearchTerm} placeholder="Buscar..." /><Button onClick={onAdd} color="blue" icon="Plus">Nuevo</Button></div></div><div className="grid grid-cols-3 gap-6">{filtered.map(c => (<div key={c.id} onClick={() => onSelect(c)} className="bg-white dark:bg-slate-900 p-6 rounded-2xl cursor-pointer"><h3 className="text-lg font-bold">{c.name}</h3></div>))}</div></div>);
        };

        const ClientDetail = ({ client, managers, onReassignManager, onBack, onUpdate, onDelete, onEdit }) => (
            <div className="space-y-6 max-w-5xl mx-auto fade-in"><button onClick={onBack} className="text-sm font-bold flex items-center gap-2 text-slate-500"><Icon name="ChevronLeft" size={16}/> Volver</button><div className="bg-white rounded-3xl p-8 shadow-xl"><h1 className="text-3xl font-black">{client.name}</h1></div></div>
        );

        const CalendarGrid = ({ events, onAdd, onEventClick, baseColor = "emerald" }) => {
            const [date, setDate] = useState(new Date());
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const startDay = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            return (<div className="flex-1 p-4"><div className="grid grid-cols-7 gap-1">{Array.from({ length: daysInMonth }, (_, i) => i + 1).map(d => {
                const dStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                return (<div key={d} onClick={() => onAdd(dStr)} className="border p-2 min-h-[100px] cursor-pointer"><span className="text-xs font-bold">{d}</span>{events.filter(e=>e.date===dStr).map(e=><div key={e.id} onClick={(ev)=>{ev.stopPropagation();onEventClick(e)}} className="text-[10px] bg-emerald-100 p-1 mt-1 rounded truncate">{e.title}</div>)}</div>);
            })}</div></div>);
        };

        const GeneralCalendarGrid = ({ activities, onDayClick }) => {
            const [date, setDate] = useState(new Date());
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            return (<div className="flex-1 p-4"><div className="grid grid-cols-7 gap-1">{Array.from({ length: daysInMonth }, (_, i) => i + 1).map(d => {
                const dStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                return (<div key={d} onClick={() => onDayClick(dStr)} className="border p-2 min-h-[100px] cursor-pointer"><span className="text-xs font-bold">{d}</span>{activities.filter(a=>a.date===dStr).slice(0,3).map((a,i)=><div key={i} className={`text-[10px] bg-${a._color}-100 p-1 mt-1 rounded truncate`}>{a.title}</div>)}</div>);
            })}</div></div>);
        };

        const EventActionModal = ({ config, onClose, onEdit, onDelete }) => {
            if (!config.isOpen) return null;
            return (<div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4"><div className="bg-white rounded-2xl w-full max-w-xs p-6 text-center"><h3 className="font-bold mb-4">{config.event.title}</h3><button onClick={()=>{onClose();onEdit(config.event, config.type)}} className="w-full py-2 bg-blue-50 text-blue-600 rounded-lg mb-2 font-bold">Editar</button><button onClick={()=>{onClose();onDelete(config.event, config.type)}} className="w-full py-2 bg-red-50 text-red-600 rounded-lg font-bold">Eliminar</button><button onClick={onClose} className="w-full py-2 mt-2 text-slate-500">Cancelar</button></div></div>);
        };

        const TaskDetailModal = ({ config, onClose, onEdit }) => {
            if (!config.isOpen || !config.task) return null;
            return (<div className="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center p-4"><div className="bg-white rounded-3xl p-6 w-full max-w-lg"><h2 className="text-xl font-black mb-4">{config.task.title}</h2><p className="text-sm text-slate-600">{config.task.notes || 'Sin notas'}</p><div className="mt-6 flex justify-end gap-3"><button onClick={onClose} className="px-4 py-2 bg-slate-100 rounded-xl font-bold">Cerrar</button><button onClick={()=>{onClose();onEdit(config.task, config.type)}} className="px-4 py-2 bg-purple-600 text-white rounded-xl font-bold">Editar</button></div></div></div>);
        };

        const DayDetailsModal = ({ config, onClose }) => {
            if (!config.isOpen) return null;
            return (<div className="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center p-4"><div className="bg-white rounded-3xl p-6 w-full max-w-lg"><h2 className="text-xl font-black mb-4">Detalles del Día</h2><button onClick={onClose} className="px-4 py-2 bg-slate-100 rounded-xl font-bold">Cerrar</button></div></div>);
        };

        const Modal = ({ config, onClose, actions }) => {
            if(!config.isOpen) return null;
            const onSubmit = (e) => { e.preventDefault(); const fd = Object.fromEntries(new FormData(e.target)); /* Lógica de guardado simplificada para asegurar render */ onClose(); };
            return (<div className="fixed inset-0 bg-black/50 z-[90] flex items-center justify-center p-4"><div className="bg-white rounded-3xl p-6 w-full max-w-md"><h3 className="font-bold text-lg mb-4">Formulario</h3><form onSubmit={onSubmit} className="space-y-4"><input name="title" placeholder="Título" required className="w-full p-3 border rounded-xl" /><button type="submit" className="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">Guardar</button><button type="button" onClick={onClose} className="w-full bg-slate-100 p-3 rounded-xl font-bold">Cancelar</button></form></div></div>);
        };

        const DeleteConfirmModal = ({ config, onClose, onConfirm }) => {
            if(!config.isOpen) return null;
            return (<div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4"><div className="bg-white rounded-3xl p-6 w-full max-w-sm text-center"><h3 className="text-lg font-black mb-4">¿Eliminar?</h3><div className="flex gap-3"><button onClick={onClose} className="flex-1 py-3 bg-slate-100 font-bold rounded-xl">Cancelar</button><button onClick={onConfirm} className="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl">Eliminar</button></div></div></div>);
        };

        const Toast = ({ message, type }) => (<div className="fixed bottom-6 right-6 px-6 py-4 bg-slate-800 text-white rounded-2xl shadow-2xl z-[110] font-bold text-sm">{message}</div>);

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
